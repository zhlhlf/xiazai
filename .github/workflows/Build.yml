name: Build


on: 
  watch:
    types: [started]
    
env:
  name: MK100.0-m1882-220707-RELEASE.zip
  URL: https://private.ppui.site/eleven/m1882/PixelPlusUI_3.10_m1882-11.0-20211008-0757-OFFICIAL.zip

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
