name: Build


on: 
  watch:
    types: [started]
    
env:
  name: 66.7z
  URL: https://148dw3-my.sharepoint.com/personal/lzy_148dw3_onmicrosoft_com/_layouts/15/download.aspx?SourceUrl=%2Fpersonal%2Flzy%5F148dw3%5Fonmicrosoft%5Fcom%2FDocuments%2FLZY%2FSGSI%2FMIUI%2FCN%2F2022%2E06%2E11%2DCC9Pro%2DVNDK29%2E30%2FMIUI13%2E1%2E6%2E0%2DCC9Pro%2D11%2DAB%2DDell%2D2%2E82GB%2DLZY%2DSGSI%2E7z

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
