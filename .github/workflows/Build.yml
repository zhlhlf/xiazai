name: Build


on: 
  watch:
    types: [started]
    
env:
  name: Fluid-1.4-Rum-UNOFFICIAL-m1882-20210503.zip
  URL: https://versaweb.dl.sourceforge.net/project/projectsakura/m1882/ProjectSakura-4.R-VANILLA-20210213-1749-m1882-OFFICIAL.zip
  
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
