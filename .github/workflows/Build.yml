name: Build


on: 
  watch:
    types: [started]
    
env:
  name: update.zip
  URL: http://dl-res.flymeos.com/Firmware/Flyme/m5_note/5.2.11.1/intl/20170322175235/c008a8d0/update.zip

  
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
