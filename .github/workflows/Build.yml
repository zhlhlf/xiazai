name: Build


on: 
  watch:
    types: [started]
    
env:
  name: dotOS-R-v5.0.0-m1882-UNOFFICIAL-20210210-0330.zip
  URL: https://doc-14-7c-docs.googleusercontent.com/docs/securesc/ha0ro937gcuc7l7deffksulhg5h7mbp1/hrsrmkqtn99dp7nuch8t2ttjlqjp0898/1653628725000/10294200703401775437/*/1ly1NmBkU5vM3nguPTjN3qeKyUY2RlY5X?e=download|

  
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
