name: Build


on: 
  watch:
    types: [started]
    
env:
  name: RROS.zip
  URL: https://doc-0k-bs-docs.googleusercontent.com/docs/securesc/d69ng8mgqm0eplgln0cvupt38j0a50f3/kqugkneh403altit3op6jqujskafcr0o/1657722300000/10294200703401775437/11292725951787006654Z/16F8TfwVRAlKH7hUH_RT421dnjHAv5Mb8?e=download&uuid=db27db9b-57d0-4114-b2d7-33096833781b

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
