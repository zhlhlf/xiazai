name: Build


on: 
  watch:
    types: [started]
    
env:
  name: update.zip
  URL: https://cldmh66-my.sharepoint.com/personal/drive_sakura-bbs_cn/_layouts/15/download.aspx?UniqueId=c4fa15d0-8514-47f1-9526-f736ea70dbaa&Translate=false&tempauth=eyJ0eXAiOiJKV1QiLCJhbGciOiJub25lIn0..dDVSb1pOZG5EMVl3U1pidG5Kci9vaVpQV1h1VWZCaCtSajRtQTZxK0Y0ST0&ApiVersion=2.0

  
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
