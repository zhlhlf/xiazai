name: Build

on: 
  watch:
    types: [started]
    
env:
  name: Fluid-1.4-Rum-UNOFFICIAL-m1882-20210503.zip
  URL: https://doc-0k-a8-docs.googleusercontent.com/docs/securesc/mqecvvqio351mk28fn9cne3fk54ec51o/46t85pa8anliidhljj363qfpj48a545n/1643668650000/09811538707180847095/08109277885982296919Z/1M2BkRuR94NRSl6OhNjHqA0BFp2BtGFNb?e=download&nonce=2pht0r25r83r2&user=08109277885982296919Z&hash=i91kh2ieajlakqr4351e9t8mirgmsfod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "Mozilla/5.0" -d tmp -o "$name" "$URL" || wget -U "Mozilla/5.0" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
