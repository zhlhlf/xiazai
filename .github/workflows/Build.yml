name: Build


on: 
  watch:
    types: [started]
    
env:
  name: lineage-19.1-20220528-UNOFFICIAL-wt88047x.zip
  URL: https://udomain.dl.sourceforge.net/project/tipzbuilds/ROMs/Xiaomi%20Redmi%202/LineageOS%2019.1/lineage-19.1-20220528-UNOFFICIAL-wt88047x.zip

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
