name: Build


on: 
  watch:
    types: [started]
    
env:
  name: dotOS-R-v5.0.0-m1882-UNOFFICIAL-20210210-0330.zip
  URL: https://ava1.androidfilehost.com/dl/RrbGBwLEBOWQMihkMf5b3w/1654439864/961840155545592306/lineage_p9000-ota-ec5aeedfbd.zip?

  
  https://ava1.androidfilehost.com/dl/RrbGBwLEBOWQMihkMf5b3w/1654439864/961840155545592306/lineage_p9000-ota-ec5aeedfbd.zip?
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
