name: Build


on: 
  watch:
    types: [started]
    
env:
  name: MK100.0-m1882-220707-RELEASE.zip
  URL: https://us-dl.mokeedev.com/firmware/TUsxMDAuMC1tMTg4Mi0yMjA3MDctUkVMRUFTRS56aXB8ZmlybXdhcmV8MTY1ODAwMTYzNA/MK100.0-m1882-220707-RELEASE.zip

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
