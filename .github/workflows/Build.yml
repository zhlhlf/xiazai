name: Build


on: 
  watch:
    types: [started]
    
env:
  name: update.zip
  URL: https://doc-0k-3o-docs.googleusercontent.com/docs/securesc/492po2v5bpr4ck1kgb5m95dqr91u5m78/ft7ld9v0j5ku71cqfgec7jcfqq27gjot/1653183750000/03792768310479159127/11390707592309309765Z/1mxq40cbq_Ch1MTE4-PYGGoKK8AJvW-jV?e=download&nonce=mtjuvdvolpekg&user=11390707592309309765Z&hash=0ts3nk531ect2j7s7p5q40tmsr6dloifTranslate=false&tempauth=eyJ0eXAiOiJKV1QiLCJhbGciOiJub25lIn0..SnY2S0FXQnVucXhBWElRZ2w0YzZWUWttdXRkdTBVaFhMN3h0V29XOWVITT0&ApiVersion=2.0

  
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
