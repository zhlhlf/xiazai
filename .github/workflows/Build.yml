name: Build


on: 
  watch:
    types: [started]
    
env:
  name: RROS.zip
  URL: https://doc-0k-bs-docs.googleusercontent.com/docs/securesc/d69ng8mgqm0eplgln0cvupt38j0a50f3/kqc766pl11jrmi2mrpl38rrfam1jvgk7/1657722075000/1029

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: 下载
      run: |
        aria2c -x16 -j5 -U "yimu" -d tmp -o "$name" "$URL" || wget -U "yimu|" "$URL" -O "tmp/$name"

    - name: 上传到transfer
      run: |
        curl -sL https://git.io/file-transfer | sh
        ls tmp
        sudo ./transfer wet tmp/$name
